function renderMenu(){
    var html='';
    for(var i=0;i<menuItems.length;i++){
        var item=menuItems[i];
        var cls=item.active?'active':'';
        var iconCls=item.active?'text-accent-light':'text-gray-500';
        var dot=item.active?'<span class="ml-auto w-1.5 h-1.5 bg-accent-light rounded-full menu-text"></span>':'';
        html+='<li><a href="javascript:void(0)" class="menu-item '+cls+' flex items-center gap-3 px-4 py-2.5 text-sm text-gray-300 hover:text-white" data-id="'+item.id+'" onclick="selectMenu(\''+item.id+'\')"><i class="fa '+item.icon+' menu-icon text-sm w-5 text-center '+iconCls+'"></i><span class="menu-text">'+item.name+'</span>'+dot+'</a></li>';
    }
    document.getElementById('menuList').innerHTML=html;
}

function selectMenu(id){
    activeMenu=id;
    var item=menuItems.find(function(m){return m.id===id;});
    document.getElementById('breadcrumb').textContent=item?item.name:id;
    var els=document.querySelectorAll('.menu-item');
    for(var i=0;i<els.length;i++){
        var el=els[i],isA=el.dataset.id===id;
        el.classList.toggle('active',isA);
        var ic=el.querySelector('.menu-icon');
        if(ic){ic.classList.toggle('text-accent-light',isA);ic.classList.toggle('text-gray-500',!isA);}
        var dot=el.querySelector('.w-1\\.5');
        if(isA&&!dot){var s=document.createElement('span');s.className='ml-auto w-1.5 h-1.5 bg-accent-light rounded-full menu-text';el.appendChild(s);}
        else if(!isA&&dot)dot.remove();
    }
    // 切换视图重新渲染
    currentView=id;
    renderAll();
}

function toggleSidebar(){
    sidebarCollapsed=!sidebarCollapsed;
    var s=document.getElementById('sidebar'),b=document.getElementById('collapseBtn');
    s.classList.toggle('collapsed',sidebarCollapsed);
    var ic=b.querySelector('.menu-icon');
    if(sidebarCollapsed){ic.classList.remove('fa-angle-double-left');ic.classList.add('fa-angle-double-right');}
    else{ic.classList.remove('fa-angle-double-right');ic.classList.add('fa-angle-double-left');}
    setTimeout(function(){resizeCharts();},350);
}

function resizeCharts(){
    if(window.__charts)for(var k in window.__charts){if(window.__charts[k]&&window.__charts[k].resize)window.__charts[k].resize();}
}

// ===== 渲染 KPI 卡片 =====
function renderKPIs(){
    var html='';
    for(var i=0;i<kpiDefs.length;i++){
        var k=kpiDefs[i];
        if(k.type==='count'){
            var count=redIssues.filter(function(r){return r.severity==='high'}).length;
            var prevCount=4,change=count-prevCount,up=change<=0;
            html+='<div class="bg-white rounded-xl shadow-sm p-3 cursor-pointer hover:shadow-md transition-shadow border-l-4 border-red-400">'+
                '<div class="flex items-center justify-between mb-1"><span class="text-xs text-slate-500 font-medium">'+k.label+'</span><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:'+k.bg+';color:'+k.color+'"><i class="fa '+k.icon+' text-xs"></i></div></div>'+
                '<div class="text-xl font-bold text-red-500 mb-1">'+count+'<span class="text-sm text-slate-400 font-normal"> 个</span></div>'+
                '<div class="flex flex-col text-[10px]"><div class="flex justify-between py-0.5 border-b border-slate-50"><span class="text-slate-400">目标</span><span class="text-slate-700 font-medium">0个</span></div>'+
                '<div class="flex justify-between py-0.5 border-b border-slate-50"><span class="text-slate-400">较上月</span><span class="'+(up?'kpi-up':'kpi-down')+' font-medium">'+(up?'↓':'↑')+Math.abs(change)+'个</span></div></div></div>';
            continue;
        }
        var val=cur[k.key],prevVal=prev[k.key];
        var isPct=k.unit==='%';
        var rate=isPct?null:(val/k.target*100);
        var mom=prevVal?((val-prevVal)/prevVal*100):0;
        var momUp=mom>=0;
        var ok=isPct?(k.better==='lower'?val<=k.target:val>=k.target):rate>=100;
        var statusCls=ok?'kpi-up':(rate&&rate>=90?'kpi-warn':'kpi-down');
        var displayVal=isPct?val.toFixed(1)+'%':'¥'+val.toFixed(0);
        var targetDisplay=isPct?(k.better==='lower'?'≤'+k.target+'%':'≥'+k.target+'%'):'¥'+k.target+'万';
        var rateStr=isPct?(ok?'达标':'超标'):rate.toFixed(1)+'%';
        var rateCls=isPct?(ok?'kpi-up':'kpi-down'):statusCls;
        html+='<div class="bg-white rounded-xl shadow-sm p-3 cursor-pointer hover:shadow-md transition-shadow">'+
            '<div class="flex items-center justify-between mb-1"><span class="text-xs text-slate-500 font-medium">'+k.label+'</span><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:'+k.bg+';color:'+k.color+'"><i class="fa '+k.icon+' text-xs"></i></div></div>'+
            '<div class="text-xl font-bold text-slate-800 mb-1">'+displayVal+'</div>'+
            '<div class="flex flex-col text-[10px]">'+
                '<div class="flex justify-between py-0.5 border-b border-slate-50"><span class="text-slate-400">目标</span><span class="text-slate-700 font-medium">'+targetDisplay+'</span></div>'+
                '<div class="flex justify-between py-0.5 border-b border-slate-50"><span class="text-slate-400">完成率</span><span class="'+rateCls+' font-medium">'+rateStr+'</span></div>'+
                '<div class="flex justify-between py-0.5"><span class="text-slate-400">环比</span><span class="'+(momUp?'kpi-up':'kpi-down')+' font-medium">'+(momUp?'+':'')+mom.toFixed(1)+'%</span></div>'+
            '</div></div>';
    }
    document.getElementById('kpiRow').innerHTML=html;
}

// ===== 象限图 =====
function renderQuadrantChart(){
    var ctx=document.getElementById('quadrantChart').getContext('2d');
    var datasets=[];
    for(var i=0;i<storeDataArr.length;i++){
        var sd=storeDataArr[i];
        datasets.push({
            label:sd.name,
            data:[{x:sd.revenueRate,y:sd.marginRatePct}],
            backgroundColor:sd.color,
            borderColor:'#fff',
            borderWidth:2,
            pointRadius:5,
            pointHoverRadius:9,
        });
    }
    var chart=new Chart(ctx,{
        type:'scatter',
        data:{datasets:datasets},
        options:{
            responsive:true,maintainAspectRatio:false,
            layout:{padding:{top:0,bottom:0,left:0,right:0}},
            plugins:{
                legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8,font:{size:11},padding:16,pointStyle:'circle'}},
                tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': 销售达成'+ctx.parsed.x+'% | 毛利达成'+ctx.parsed.y+'%';}}},
            },
            scales:{
                x:{title:{display:true,text:'销售达成率 (%)',font:{size:11}},min:80,max:125,grid:{color:'#e2e8f0'},ticks:{callback:function(v){return v+'%';},font:{size:10}}},
                y:{title:{display:true,text:'边际毛利达成率 (%)',font:{size:11}},min:80,max:125,grid:{color:'#e2e8f0'},ticks:{callback:function(v){return v+'%';},font:{size:10}}},
            }
        },
        plugins:[{
            id:'quadrantBg',
            beforeDraw:function(chart){
                var c=chart,ctx=c.ctx,x=c.scales.x,y=c.scales.y,ca=c.chartArea;
                var cx=x.getPixelForValue(100),cy=y.getPixelForValue(100);
                ctx.save();
                // 四个象限背景色
                var quads=[
                    {x:cx,y:ca.top,w:ca.right-cx,h:cy-ca.top,color:'rgba(34,197,94,0.06)'},    // 右上: 高达成高毛利
                    {x:ca.left,y:ca.top,w:cx-ca.left,h:cy-ca.top,color:'rgba(59,130,246,0.04)'}, // 左上: 低达成高毛利
                    {x:ca.left,y:cy,w:cx-ca.left,h:ca.bottom-cy,color:'rgba(239,68,68,0.05)'},   // 左下: 低达成低毛利
                    {x:cx,y:cy,w:ca.right-cx,h:ca.bottom-cy,color:'rgba(245,158,11,0.05)'},      // 右下: 高达成低毛利
                ];
                for(var qi=0;qi<quads.length;qi++){
                    var q=quads[qi];
                    ctx.fillStyle=q.color;
                    ctx.fillRect(q.x,q.y,q.w,q.h);
                }
                // 十字虚线
                ctx.strokeStyle='rgba(148,163,184,0.5)';ctx.lineWidth=2;ctx.setLineDash([8,5]);
                ctx.beginPath();ctx.moveTo(cx,ca.top);ctx.lineTo(cx,ca.bottom);ctx.stroke();
                ctx.beginPath();ctx.moveTo(ca.left,cy);ctx.lineTo(ca.right,cy);ctx.stroke();
                ctx.restore();
            },
            afterDraw:function(chart){
                var c=chart,ctx=c.ctx,ca=c.chartArea;
                ctx.save();
                // 象限标签
                ctx.font='11px sans-serif';ctx.setLineDash([]);
                ctx.fillStyle='rgba(34,197,94,0.55)';ctx.fillText('高达成高毛利',ca.right-115,ca.top+16);
                ctx.fillStyle='rgba(59,130,246,0.45)';ctx.fillText('低达成高毛利',ca.left+4,ca.top+16);
                ctx.fillStyle='rgba(239,68,68,0.45)';ctx.fillText('低达成低毛利',ca.left+4,ca.bottom-4);
                ctx.fillStyle='rgba(245,158,11,0.45)';ctx.fillText('高达成低毛利',ca.right-115,ca.bottom-4);
                // 每个点的标签——按象限自动调整方向
                ctx.shadowColor='#fff';ctx.shadowBlur=3;
                for(var di=0;di<chart.data.datasets.length;di++){
                    var meta2=chart.getDatasetMeta(di);
                    if(meta2&&meta2.data&&meta2.data[0]){
                        var pt=meta2.data[0];
                        var sd=storeDataArr[di];
                        // 下半区标签放点下方，上半区放点上方
                        var below=sd.marginRatePct<100;
                        var yOff=below?18:-18;
                        var yOff2=below?28:-8;
                        ctx.textAlign='center';
                        ctx.fillStyle=sd.color;ctx.font='bold 10px sans-serif';
                        ctx.fillText(sd.name,pt.x,pt.y+yOff);
                        ctx.fillStyle='#64748b';ctx.font='9px sans-serif';
                        ctx.fillText(sd.revenueRate+'% / '+sd.marginRatePct+'%',pt.x,pt.y+yOff2);
                    }
                }
                ctx.shadowColor='transparent';ctx.shadowBlur=0;
                ctx.textAlign='start';
                ctx.restore();
            }
        }]
    });
    if(!window.__charts)window.__charts={};
    window.__charts.quadrant=chart;
}

// ===== 矩形树图 Treemap（百分比）—— 2行×3列 偏正方形 =====
function renderTreemap(){
    var colors=['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6'];
    var stores=[];
    var totalAll=0;
    for(var si=0;si<STORES.length;si++){
        var t=sumArr(heatData[si]);
        stores.push({name:STORES[si],total:t,color:colors[si]});
        totalAll+=t;
    }
    stores.sort(function(a,b){return b.total-a.total;});

    // 分两行：前3大 占55%高，后3 占45%高
    var row1=stores.slice(0,3), row2=stores.slice(3,6);
    var r1Total=row1.reduce(function(s,x){return s+x.total;},0);
    var r2Total=row2.reduce(function(s,x){return s+x.total;},0);

    function rowHTML(row,rowTotal,hPct){
        var h='';
        for(var i=0;i<row.length;i++){
            var s=row[i];
            var pct=+(s.total/totalAll*100).toFixed(1);
            var w=s.total/rowTotal*100;
            var flexVal=i===row.length-1?'flex:1':'flex:0 0 '+w.toFixed(1)+'%';
            h+='<div class="flex flex-col items-center justify-center text-white text-center cursor-pointer hover:brightness-110 transition-all" style="'+flexVal+';background:'+s.color+';min-width:55px" title="'+s.name+': ¥'+s.total+'万 ('+pct+'%)">'+
                '<span class="font-semibold text-sm whitespace-nowrap">'+s.name+'</span>'+
                '<span class="font-extrabold text-xl">'+pct+'%</span>'+
                '<span class="text-xs opacity-80">¥'+s.total+'万</span>'+
            '</div>';
        }
        return h;
    }

    var html='<div style="display:flex;flex-direction:column;width:100%;height:100%;min-height:220px;border-radius:10px;overflow:hidden;gap:2px">'+
        '<div style="display:flex;flex:0 0 55%;gap:2px">'+rowHTML(row1,r1Total,55)+'</div>'+
        '<div style="display:flex;flex:0 0 45%;gap:2px">'+rowHTML(row2,r2Total,45)+'</div>'+
    '</div>';
    document.getElementById('treemapArea').innerHTML=html;
}

// ===== 热力矩阵（品类按销量降序） =====
function renderHeatmap(){
    var colTotal=[],heatMax=0,grandTotal=0;
    for(var ci=0;ci<CATEGORIES.length;ci++){var s=0;for(var ri=0;ri<heatData.length;ri++)s+=heatData[ri][ci];colTotal.push(s);grandTotal+=s;}
    for(var ri2=0;ri2<heatData.length;ri2++){for(var ci2=0;ci2<heatData[ri2].length;ci2++){if(heatData[ri2][ci2]>heatMax)heatMax=heatData[ri2][ci2];}}
    var rowTotals=[];
    for(var ri3=0;ri3<heatData.length;ri3++)rowTotals.push(sumArr(heatData[ri3]));

    // 按品类销量降序排列
    var colOrder=[];
    for(var ci=0;ci<CATEGORIES.length;ci++)colOrder.push({name:CATEGORIES[ci],total:colTotal[ci],idx:ci});
    colOrder.sort(function(a,b){return b.total-a.total;});

    var html='<table class="text-xs w-full border-separate" style="border-spacing:3px"><thead><tr><th class="p-1.5 text-slate-400 font-medium text-left w-16">店铺</th>';
    for(var oi=0;oi<colOrder.length;oi++)html+='<th class="p-1.5 text-slate-400 font-medium text-center">'+colOrder[oi].name+'</th>';
    html+='<th class="p-1.5 text-slate-600 font-semibold text-center bg-slate-50 rounded">合计</th></tr></thead><tbody>';
    for(var ri4=0;ri4<heatData.length;ri4++){
        html+='<tr><td class="p-1.5 text-slate-700 font-semibold text-left">'+STORES[ri4]+'</td>';
        for(var oi2=0;oi2<colOrder.length;oi2++){
            var ci4=colOrder[oi2].idx;
            var val=heatData[ri4][ci4];
            var pct=(val/grandTotal*100).toFixed(1);
            var intensity=Math.round(val/heatMax*100);
            var r,g,b;
            if(intensity>70){r=37;g=99;b=235;}
            else if(intensity>40){r=59;g=130;b=246;}
            else if(intensity>20){r=96;g=165;b=250;}
            else if(intensity>8){r=147;g=197;b=253;}
            else {r=191;g=219;b=254;}
            var alpha=0.35+intensity/100*0.55;
            var bg='rgba('+r+','+g+','+b+','+alpha.toFixed(2)+')';
            var tc=intensity>45?'text-white':'text-slate-600';
            var tcSub=intensity>45?'text-blue-100':'text-slate-400';
            html+='<td class="heat-cell text-center rounded-md cursor-default '+tc+'" style="background:'+bg+';padding:4px 2px;min-width:52px">'+
                '<div class="font-bold text-xs">¥'+val+'万</div>'+
                '<div class="'+tcSub+'" style="font-size:9px">'+pct+'%</div></td>';
        }
        var rPct=(rowTotals[ri4]/grandTotal*100).toFixed(1);
        html+='<td class="text-center font-bold text-slate-800 bg-slate-50 rounded-md" style="padding:4px 2px;min-width:48px"><div class="text-xs">¥'+rowTotals[ri4]+'万</div><div class="text-slate-400" style="font-size:9px">'+rPct+'%</div></td></tr>';
    }
    html+='<tr class="bg-slate-100"><td class="p-1.5 text-slate-600 font-bold text-left rounded-l-md">合计</td>';
    for(var oi3=0;oi3<colOrder.length;oi3++){
        var ct=colOrder[oi3].total;
        var cPct=(ct/grandTotal*100).toFixed(1);
        html+='<td class="text-center font-bold text-slate-800 rounded-md" style="padding:4px 2px"><div class="text-xs">¥'+ct+'万</div><div class="text-slate-500" style="font-size:9px">'+cPct+'%</div></td>';
    }
    html+='<td class="text-center font-extrabold text-slate-800 bg-slate-200 rounded-md" style="padding:4px 2px"><div class="text-xs">¥'+grandTotal+'万</div><div class="text-slate-500" style="font-size:9px">100%</div></td></tr></tbody></table>';
    document.getElementById('heatmapArea').innerHTML=html;
}

// ===== 目标预测 =====
function renderGaugeChart(){
    var target=800,done=cur.revenue,pct=+(done/target*100).toFixed(1);
    var daysElapsed=26,totalDays=31;
    var predicted=Math.round(done/daysElapsed*totalDays);
    var predictPct=+(predicted/target*100).toFixed(1);
    var remainDays=totalDays-daysElapsed;
    var profitRate=+(cur.profit/cur.revenue*100).toFixed(1);
    var collectRate=+(cur.collection/cur.revenue*100).toFixed(1);
    var totalGap=sumArr(gapPlans.map(function(g){return g.gap-g.compensated;}));

    var rings=[
        {id:'gaugeChart1',val:done,total:target,label:'目标完成率',pct:pct+'%',color:'#3b82f6',
         detail:[{k:'月度目标',v:'¥'+target+'万'},{k:'当前完成',v:'¥'+done+'万'},{k:'预计月末',v:'¥'+predicted+'万 ('+predictPct+'%)'},{k:'剩余',v:remainDays+'天'}]},
        {id:'gaugeChart2',val:cur.profit,total:cur.revenue,label:'净利润率',pct:profitRate+'%',color:'#22c55e',
         detail:[{k:'净利润',v:'¥'+cur.profit+'万'},{k:'营业收入',v:'¥'+cur.revenue+'万'},{k:'环比',v:'+'+((cur.profit-prev.profit)/prev.profit*100).toFixed(1)+'%'}]},
        {id:'gaugeChart3',val:cur.collection,total:cur.revenue,label:'回款率',pct:collectRate+'%',color:'#8b5cf6',
         detail:[{k:'回款金额',v:'¥'+cur.collection+'万'},{k:'应收账款',v:'¥'+(cur.revenue-cur.collection)+'万'},{k:'店铺缺口',v:'¥'+totalGap+'万'}]},
    ];

    var html='';
    for(var ri=0;ri<rings.length;ri++){
        var r=rings[ri];
        html+='<div class="flex items-center gap-2 flex-1"><div class="relative flex-shrink-0" style="width:88px;height:88px"><canvas id="'+r.id+'"></canvas></div>'+
            '<div class="flex-1 text-xs"><div class="font-semibold text-slate-700 mb-0.5">'+r.label+' <span class="text-lg font-extrabold" style="color:'+r.color+'">'+r.pct+'</span></div>'+
            '<div class="flex flex-wrap gap-x-3 gap-y-0 text-[10px] text-slate-500">';
        for(var di=0;di<r.detail.length;di++){
            html+='<span>'+r.detail[di].k+' <b class="text-slate-700">'+r.detail[di].v+'</b></span>';
        }
        html+='</div></div></div>';
    }
    document.getElementById('gaugeRings').innerHTML=html;

    // 渲染 canvas
    for(var ri2=0;ri2<rings.length;ri2++){
        (function(r){
        var ctx=document.getElementById(r.id).getContext('2d');
        var chart=new Chart(ctx,{
            type:'doughnut',
            data:{datasets:[{data:[r.val,Math.max(0,r.total-r.val)],backgroundColor:[r.color,'#e2e8f0'],borderWidth:0,borderRadius:10,cutout:'68%'}]},
            options:{responsive:true,maintainAspectRatio:true,plugins:{tooltip:{enabled:false},legend:{display:false}}},
            plugins:[{id:r.id+'text',afterDraw:function(chart){
                var ctx=chart.ctx,w=chart.width,h=chart.height;
                ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
                ctx.fillStyle='#1e293b';ctx.font='bold 16px sans-serif';ctx.fillText(r.pct,w/2,h/2);
                ctx.restore();
            }}]
        });
        if(!window.__charts)window.__charts={};
        window.__charts[r.id]=chart;
        })(rings[ri2]);
    }
}

function renderGapPlans(){
    var html='';
    var sorted=gapPlans.slice().sort(function(a,b){return (b.gap-b.compensated)-(a.gap-a.compensated);});
    for(var i=0;i<sorted.length;i++){
        var g=sorted[i];
        var pct=Math.round(g.compensated/g.gap*100);
        var remaining=g.gap-g.compensated;
        var barColor=remaining<=0?'bg-green-500':(pct>=50?'bg-yellow-500':'bg-red-500');
        html+='<div><div class="flex items-center justify-between text-xs mb-1"><span class="text-slate-600 font-medium">'+g.item+'</span><span class="text-slate-400">差¥'+remaining+'万</span></div>'+
            '<div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden"><div class="progress-fill '+barColor+' h-full rounded-full flex items-center justify-end pr-2 text-white text-[10px] font-medium" style="width:'+pct+'%">'+(pct>=20?pct+'%':'')+'</div></div>'+
            '<div class="text-[10px] text-slate-400 mt-0.5 truncate">'+g.actions+'</div></div>';
    }
    document.getElementById('gapPlanArea').innerHTML=html;
}

// ===== renderMarketKPIs：8个KPI卡片+迷你趋势条 =====
function renderMarketKPIs(){
    var html='';
    for(var i=0;i<marketKPIs.length;i++){
        var k=marketKPIs[i];
        var momCls=k.up?'kpi-up':'kpi-down';
        var maxV=Math.max.apply(null,k.trend),minV=Math.min.apply(null,k.trend),range=maxV-minV||1;
        var bars='';
        for(var j=0;j<k.trend.length;j++){
            var h=((k.trend[j]-minV)/range*100).toFixed(0);
            var isLast=j===k.trend.length-1;
            bars+='<div class="flex-1 rounded-t-sm '+(isLast?'':'opacity-40')+'" style="height:'+h+'%;background:'+k.color+';min-width:3px;max-width:6px"></div>';

// ===== renderPlatCatMatrix：平台×类目机会矩阵 =====
function renderPlatCatMatrix(){
    var maxVal=0;
    for(var ri=0;ri<platCatData.length;ri++){for(var ci=0;ci<platCatData[ri].length;ci++){if(platCatData[ri][ci]>maxVal)maxVal=platCatData[ri][ci];}}
    var html='<table class="text-[10px] w-full border-separate" style="border-spacing:2px"><thead><tr><th class="p-1 text-left text-slate-400"></th>';
    for(var ci=0;ci<platCatCategories.length;ci++)html+='<th class="p-1 text-center text-slate-400">'+platCatCategories[ci]+'</th>';
    html+='</tr></thead><tbody>';
    for(var ri=0;ri<platCatPlatforms.length;ri++){
        html+='<tr><td class="p-1 text-slate-700 font-semibold">'+platCatPlatforms[ri]+'</td>';
        for(var ci=0;ci<platCatCategories.length;ci++){
            var v=platCatData[ri][ci],intensity=v/maxVal;
            var r,g,b;
            if(intensity>0.75){r=34;g=197;b=94;}
            else if(intensity>0.5){r=96;g=165;b=250;}
            else if(intensity>0.25){r=191;g=219;b=254;}
            else{r=241;g=245;b=249;}
            var alpha=0.35+intensity*0.55;
            var bg='rgba('+r+','+g+','+b+','+alpha.toFixed(2)+')';
            var tc=intensity>0.5?'text-white font-semibold':'text-slate-600';
            html+='<td class="p-1 text-center rounded '+tc+'" style="background:'+bg+'">'+v+'</td>';
        }
        html+='</tr>';
    }
    html+='</tbody></table>';
    document.getElementById('platCatMatrix').innerHTML=html;
}

function renderOfflineIndustryChart(){
    var ctx=document.getElementById('offlineIndustryChart').getContext('2d');
    var labels=[],values=[],colors=[];
    for(var i=0;i<offlineIndustryData.length;i++){labels.push(offlineIndustryData[i].name);values.push(offlineIndustryData[i].value);colors.push(offlineIndustryData[i].color);}
    var total=values.reduce(function(a,b){return a+b;},0);
    var chart=new Chart(ctx,{
        type:'doughnut',
        data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
        options:{
            responsive:true,maintainAspectRatio:true,
            cutout:'62%',
            plugins:{
                legend:{display:false},
                tooltip:{callbacks:{label:function(c){return c.label+': '+c.raw+'家 ('+(c.raw/total*100).toFixed(1)+'%)';}}}
            }
        }
    });
    if(!window.__charts)window.__charts={};
    window.__charts.offlineIndustry=chart;
    // 图例
    var legendHtml='';
    for(var j=0;j<offlineIndustryData.length;j++){
        var d=offlineIndustryData[j];
        legendHtml+='<div class="flex items-center justify-between"><div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background:'+d.color+'"></span><span class="text-slate-600">'+d.name+'</span></div><span class="font-semibold text-slate-700">'+d.value+'<span class="text-slate-400 font-normal">家</span> ('+(d.value/total*100).toFixed(1)+'%)</span></div>';
    }
    document.getElementById('offlineIndustryLegend').innerHTML=legendHtml;
}

function renderOfflineRiskMatrix(){
    var maxVal=0;
    for(var ri=0;ri<offlineRiskData.length;ri++){for(var ci=0;ci<offlineRiskData[ri].length;ci++){if(offlineRiskData[ri][ci]>maxVal)maxVal=offlineRiskData[ri][ci];}}
    var html='<table class="text-xs w-full border-separate" style="border-spacing:2px"><thead><tr><th class="p-1 text-slate-400 text-center w-8"></th>';
    for(var ci=0;ci<offlineRiskLabels.cols.length;ci++){html+='<th class="p-1 text-center text-slate-400 font-normal text-[10px]">'+offlineRiskLabels.cols[ci]+'</th>';}
    html+='</tr></thead><tbody>';
    for(var ri=0;ri<offlineRiskData.length;ri++){
        html+='<tr><td class="p-1 text-slate-400 font-medium text-[10px]">'+offlineRiskLabels.rows[ri]+'</td>';
        for(var ci2=0;ci2<offlineRiskData[ri].length;ci2++){
            var v=offlineRiskData[ri][ci2];
            var alpha=(v/maxVal*0.85+0.15).toFixed(2);
            html+='<td class="p-1.5 text-center font-semibold text-slate-700 rounded cursor-pointer heat-cell" style="background:'+offlineRiskColors[ri][ci2]+'">'+v+'</td>';
        }
        html+='</tr>';
    }
    html+='</tbody></table>';
    document.getElementById('offlineRiskArea').innerHTML=html;

function renderCustomerLifeChart(){
	if(window.__charts&&window.__charts.customerLife)window.__charts.customerLife.destroy();
	var ctx=document.getElementById('customerLifeChart').getContext('2d');
	var labels=[],values=[],colors=[];
	for(var i=0;i<customerLifecycleData.length;i++){labels.push(customerLifecycleData[i].stage);values.push(customerLifecycleData[i].count);colors.push(customerLifecycleData[i].color);}
	var total=values.reduce(function(a,b){return a+b;},0);
	var chart=new Chart(ctx,{
		type:'doughnut',
		data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
		options:{responsive:true,maintainAspectRatio:true,cutout:'55%',plugins:{legend:{display:false}}},
		plugins:[{
			id:'customerLifeCenter',
			afterDraw:function(chart){
				var ctx2=chart.ctx;
				ctx2.save();ctx2.textAlign='center';ctx2.textBaseline='middle';
				ctx2.font='bold 16px -apple-system,BlinkMacSystemFont,sans-serif';
				ctx2.fillStyle='#1e293b';
				ctx2.fillText(total+'家',chart.width/2,chart.height/2-3);
				ctx2.font='10px -apple-system,BlinkMacSystemFont,sans-serif';
				ctx2.fillStyle='#94a3b8';
				ctx2.fillText('总客户数',chart.width/2,chart.height/2+14);
				ctx2.restore();
			}
		}]
	});
	if(!window.__charts)window.__charts={};
	window.__charts.customerLife=chart;
	var legendHtml='';
	for(var j=0;j<customerLifecycleData.length;j++){
		var d=customerLifecycleData[j];
		legendHtml+='<div class="flex items-center justify-between py-0.5"><div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:'+d.color+'"></span><span class="text-slate-600">'+d.stage+'</span></div><div><span class="font-semibold text-slate-700">'+d.count+'家</span><span class="text-slate-400 ml-1">'+d.pct.toFixed(1)+'%</span><span class="text-slate-400 ml-2">¥'+d.revenue+'万</span></div></div>';
	}
	var totalRev=customerLifecycleData.reduce(function(a,b){return a+b.revenue;},0);
	legendHtml+='<div class="flex items-center justify-between pt-1 border-t border-slate-100 mt-1"><span class="text-slate-600 font-semibold">合计</span><span class="font-bold text-slate-700">'+total+'家 <span class="text-slate-400 font-normal">¥'+totalRev+'万</span></span></div>';
	document.getElementById('customerLifeLegend').innerHTML=legendHtml;
}

function renderProductTreemap(){
    var container=document.getElementById('productTreemapArea');
    var W=container.clientWidth||280,H=260,total=sumArr(productCategoryData.map(function(x){return x.value;}));
    var html='<div style="display:flex;flex-wrap:wrap;width:100%;height:100%">';
    var row1=productCategoryData.slice(0,3),row2=productCategoryData.slice(3,6),row3=productCategoryData.slice(6);
    var r1t=sumArr(row1.map(function(x){return x.value;})),r2t=sumArr(row2.map(function(x){return x.value;})),r3t=sumArr(row3.map(function(x){return x.value;}));
    function r(items,rt,hPct){
        var hh='';
        for(var i=0;i<items.length;i++){
            var it=items[i],w=it.value/rt*100,pct=+(it.value/total*100).toFixed(1);

        }

function renderPriceMatrix(){
    var ranges=['0-50','50-100','100-200','200-500','500+'];
    var maxVal=0;
    for(var i=0;i<priceMatrixData.length;i++){for(var j=0;j<priceMatrixData[i].ranges.length;j++){if(priceMatrixData[i].ranges[j].val>maxVal)maxVal=priceMatrixData[i].ranges[j].val;}}
    var html='<table class="text-[11px] w-full h-full border-separate" style="border-spacing:3px"><thead><tr><th class="p-2 text-left text-slate-400">品类</th>';
    for(var ri=0;ri<ranges.length;ri++)html+='<th class="p-2 text-center text-slate-400">¥'+ranges[ri]+'</th>';
    html+='</tr></thead><tbody>';
    for(var i=0;i<priceMatrixData.length;i++){
        var pc=priceMatrixData[i];
        html+='<tr><td class="p-2 text-slate-700 font-semibold">'+pc.cat+'</td>';
        for(var j=0;j<pc.ranges.length;j++){
            var rv=pc.ranges[j],intensity=Math.round(rv.val/maxVal*100);
            var bg='rgba(59,130,246,'+(intensity/100*0.65+0.05).toFixed(2)+')';
            var tc=intensity>50?'text-white':'text-slate-600';
            html+='<td class="p-2 text-center rounded font-bold '+tc+'" style="background:'+bg+'">¥'+rv.val+'</td>';
        }
        html+='</tr>';
    }
    html+='</tbody></table>';
    document.getElementById('priceMatrixArea').innerHTML=html;
}

function renderLifecycleChart(){

    var data=[];for(var i=0;i<lifecycleData.length;i++)data.push(lifecycleData[i].count);
    var colors=[];for(var i=0;i<lifecycleData.length;i++)colors.push(lifecycleData[i].color);

    var chart=new Chart(ctx,{
        type:'doughnut',
        data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverBorderWidth:3,hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:true,cutout:'50%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'个 ('+lifecycleData[ctx.dataIndex].pct+'%)';}}}}},
        plugins:[{id:'lCtr',afterDraw:function(chart){var c=chart.ctx;c.save();c.textAlign='center';c.textBaseline='middle';c.fillStyle='#1e293b';c.font='bold 14px sans-serif';c.fillText(total+'个',chart.width/2,chart.height/2-4);c.fillStyle='#94a3b8';c.font='9px sans-serif';c.fillText('总SKU',chart.width/2,chart.height/2+12);c.restore();}}]
    });
    if(!window.__charts)window.__charts={};window.__charts.lifecycle=chart;
    setTimeout(function(){
        var cvs2=document.getElementById('lifecycleChart');

        cx2.restore();
    },300);

    var legHtml='<div class="flex flex-col gap-1.5">';
    for(var i=0;i<lifecycleData.length;i++){
        var d=lifecycleData[i];

function renderFinanceWaterfallChart(){
	if(window.__charts&&window.__charts.financeWaterfall)window.__charts.financeWaterfall.destroy();
	var ctx=document.getElementById('financeWaterfallChart').getContext('2d');
	var labels=[],baseVals=[],deltaVals=[],colors=[];
	var cum=0;
	for(var i=0;i<financeWaterfallData.length;i++){
		var d=financeWaterfallData[i];
		labels.push(d.label);
		if(d.type==='subtotal'||d.type==='total'){
			baseVals.push(0);
			deltaVals.push(cum);
		}else{
			baseVals.push(d.value>=0?cum:cum+d.value);
			deltaVals.push(Math.abs(d.value));
			cum+=d.value;
		}
		if(d.type==='base')colors.push('#3b82f6');
		else if(d.type==='subtotal')colors.push('#22c55e');
		else if(d.type==='total')colors.push('#1e40af');
		else colors.push('#ef4444');
	}
	var chart=new Chart(ctx,{
		type:'bar',
		data:{
			labels:labels,
			datasets:[
				{label:'基座（透明）',data:baseVals,backgroundColor:'transparent',stack:'stack1'},
				{label:'金额',data:deltaVals,backgroundColor:colors,stack:'stack1',borderRadius:4,borderSkipped:false}
			]
		},
		options:{
			responsive:true,maintainAspectRatio:false,
			plugins:{
				legend:{display:false},
				tooltip:{callbacks:{label:function(c){if(c.datasetIndex===0)return'';var d=financeWaterfallData[c.dataIndex];return d.label+': ¥'+(d.value>=0?'+':'')+d.value+'万';}}}
			},
			scales:{
				x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45}},
				y:{grid:{color:'#e2e8f0'},ticks:{callback:function(v){return v+'万';},font:{size:10}}}
			}
		},
		plugins:[{
			id:'waterfallLabels',
			afterDatasetsDraw:function(chart){
				var ctx2=chart.ctx;
				var meta=chart.getDatasetMeta(1);
				ctx2.save();
				ctx2.font='bold 10px -apple-system,BlinkMacSystemFont,sans-serif';
				ctx2.textAlign='center';
				ctx2.textBaseline='bottom';
				for(var i=0;i<meta.data.length;i++){
					var d=financeWaterfallData[i];
					var val=d.value;
					var displayVal;
					if(d.type==='subtotal'||d.type==='total'){
						displayVal='¥'+val;
					}else{
						displayVal=(val>=0?'+':'')+'¥'+val;
					}
					var x=meta.data[i].x;
					var y=meta.data[i].y;
					ctx2.fillStyle='#334155';
					ctx2.fillText(displayVal+'万',x,y-4);
				}
				ctx2.restore();
			}
		}]
	});
	if(!window.__charts)window.__charts={};
	window.__charts.financeWaterfall=chart;
}

function renderFinanceExpenseStructure(){
	if(window.__charts&&window.__charts.financeExpense)window.__charts.financeExpense.destroy();
	var ctx=document.getElementById('financeExpenseChart').getContext('2d');
	var labels=[],values=[],colors=[];
	for(var i=0;i<financeExpenseData.length;i++){
		labels.push(financeExpenseData[i].name);
		values.push(financeExpenseData[i].pct);
		colors.push(financeExpenseData[i].color);
	}
	var totalAmount=financeExpenseData.reduce(function(a,b){return a+b.amount;},0);
	var chart=new Chart(ctx,{
		type:'doughnut',
		data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:1,hoverBorderWidth:2,hoverBorderColor:'#fff'}]},
		options:{
			responsive:true,maintainAspectRatio:true,
			cutout:'58%',
			plugins:{
				legend:{display:false},
				tooltip:{callbacks:{label:function(c){var d=financeExpenseData[c.dataIndex];return d.name+': ¥'+d.amount+'万 ('+c.raw.toFixed(1)+'%)';}}}
			}
		},
		plugins:[{
			id:'expenseCenterText',
			afterDraw:function(chart){
				var m=chart.getDatasetMeta(0);
				if(!m||!m.data.length)return;
				var ctx2=chart.ctx;
				ctx2.save();
				ctx2.textAlign='center';
				ctx2.textBaseline='middle';
				ctx2.font='bold 15px -apple-system,BlinkMacSystemFont,sans-serif';
				ctx2.fillStyle='#1e293b';
				ctx2.fillText('¥'+totalAmount+'万',chart.width/2,chart.height/2-3);
				ctx2.font='9px -apple-system,BlinkMacSystemFont,sans-serif';
				ctx2.fillStyle='#94a3b8';
				ctx2.fillText('费用合计',chart.width/2,chart.height/2+13);
				ctx2.restore();
			}
		}]
	});
	if(!window.__charts)window.__charts={};
	window.__charts.financeExpense=chart;
	var legendHtml='<div class="space-y-0.5">';
	for(var j=0;j<financeExpenseData.length;j++){

	}

function renderTechFaultChart(){
	if(window.__charts&&window.__charts.techFault)window.__charts.techFault.destroy();
	var ctx=document.getElementById('techFaultChart').getContext('2d');
	var labels=[],values=[],colors=[];
	for(var i=0;i<techFaultData.length;i++){labels.push(techFaultData[i].label);values.push(techFaultData[i].pct);colors.push(techFaultData[i].color);}
	var chart=new Chart(ctx,{
		type:'doughnut',data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
		options:{responsive:true,maintainAspectRatio:true,cutout:'55%',plugins:{legend:{display:false}}},
		plugins:[{id:'techFaultCenter',afterDraw:function(chart){
			var ctx2=chart.ctx;ctx2.save();ctx2.textAlign='center';ctx2.textBaseline='middle';
			ctx2.font='bold 15px -apple-system,BlinkMacSystemFont,sans-serif';ctx2.fillStyle='#1e293b';
			ctx2.fillText(techFaultTotal+'个',chart.width/2,chart.height/2-3);
			ctx2.font='10px -apple-system,BlinkMacSystemFont,sans-serif';ctx2.fillStyle='#94a3b8';
			ctx2.fillText('故障总数',chart.width/2,chart.height/2+14);ctx2.restore();
		}}]
	});
	if(!window.__charts)window.__charts={};window.__charts.techFault=chart;
	var leg='';
	for(var j=0;j<techFaultData.length;j++){var d=techFaultData[j];
		leg+='<div class="flex items-center justify-between py-0.5"><div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:'+d.color+'"></span><span class="text-[11px] text-slate-600">'+d.label+'</span></div><span class="text-[11px]"><span class="font-semibold text-slate-700">'+d.count+'</span><span class="text-slate-400 ml-1">'+d.pct.toFixed(1)+'%</span></span></div>';
	}
	document.getElementById('techFaultLegend').innerHTML=leg;
}

		'<th class="p-1.5 text-left text-slate-400">型号</th><th class="p-1.5 text-right text-slate-400">工单数</th><th class="p-1.5 text-center text-slate-400">故障率</th><th class="p-1.5 text-center text-slate-400">首次解决率</th><th class="p-1.5 text-center text-slate-400">返修率</th><th class="p-1.5 text-center text-slate-400">满意度</th></tr></thead><tbody>';
	for(var i=0;i<techModelData.length;i++){
		var m=techModelData[i];
		var fixCls=parseFloat(m.firstFix)>=85?'kpi-up':(parseFloat(m.firstFix)>=78?'kpi-warn':'kpi-down');
		var retCls=parseFloat(m.returnRate)<=2?'kpi-up':(parseFloat(m.returnRate)<=3?'kpi-warn':'kpi-down');
		html+='<tr class="border-b border-slate-50 hover:bg-slate-50">'+
			'<td class="p-1.5 text-slate-700 font-medium">'+m.model+'</td>'+
			'<td class="p-1.5 text-right text-slate-600">'+m.tickets+'</td>'+
			'<td class="p-1.5 text-center text-slate-600">'+m.faultRate+'</td>'+
			'<td class="p-1.5 text-center font-semibold '+fixCls+'">'+m.firstFix+'</td>'+
			'<td class="p-1.5 text-center font-semibold '+retCls+'">'+m.returnRate+'</td>'+
			'<td class="p-1.5 text-center text-slate-700">'+m.satisfaction+'</td></tr>';
	}
	html+='</tbody></table>';
	document.getElementById('techModelArea').innerHTML=html;
}

function renderTechTicketChart(){
	if(window.__charts&&window.__charts.techTicket)window.__charts.techTicket.destroy();
	var ctx=document.getElementById('techTicketChart').getContext('2d');
	var labels=[],values=[],colors=[];
	for(var i=0;i<techTicketStatus.length;i++){labels.push(techTicketStatus[i].label);values.push(techTicketStatus[i].pct);colors.push(techTicketStatus[i].color);}
	var chart=new Chart(ctx,{
		type:'doughnut',data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
		options:{responsive:true,maintainAspectRatio:true,cutout:'55%',plugins:{legend:{display:false}}},
		plugins:[{id:'techTicketCenter',afterDraw:function(chart){
			var ctx2=chart.ctx;ctx2.save();ctx2.textAlign='center';ctx2.textBaseline='middle';
			ctx2.font='bold 15px -apple-system,BlinkMacSystemFont,sans-serif';ctx2.fillStyle='#1e293b';
			ctx2.fillText(techTicketTotal+'个',chart.width/2,chart.height/2-3);
			ctx2.font='10px -apple-system,BlinkMacSystemFont,sans-serif';ctx2.fillStyle='#94a3b8';
			ctx2.fillText('总工单数',chart.width/2,chart.height/2+14);ctx2.restore();
		}}]
	});
	if(!window.__charts)window.__charts={};window.__charts.techTicket=chart;
	var leg='';
	for(var j=0;j<techTicketStatus.length;j++){var d=techTicketStatus[j];
		leg+='<div class="flex items-center justify-between py-0.5"><div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:'+d.color+'"></span><span class="text-[11px] text-slate-600">'+d.label+'</span></div><span class="text-[11px]"><span class="font-semibold text-slate-700">'+d.count+'</span><span class="text-slate-400 ml-1">'+d.pct.toFixed(1)+'%</span></span></div>';
	}
	document.getElementById('techTicketLegend').innerHTML=leg;
}

function renderMeetingTypeChart(){
	if(window.__charts&&window.__charts.meetingType)window.__charts.meetingType.destroy();
	var ctx=document.getElementById('meetingTypeChart').getContext('2d');
	var labels=[],values=[],colors=[];
	for(var i=0;i<meetingTypeData.length;i++){labels.push(meetingTypeData[i].label);values.push(meetingTypeData[i].pct);colors.push(meetingTypeData[i].color);}
	var chart=new Chart(ctx,{
		type:'doughnut',data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
